name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      STELLAR_CLI_VERSION: 26.0.0
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32v1-none is the Soroban-recommended WASM target as of soroban-sdk 25.x
          # (the older wasm32-unknown-unknown still works but is deprecated for Soroban)
          targets: wasm32v1-none
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Stellar CLI
        run: |
          curl -L --fail \
            "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -o stellar-cli.tar.gz
          sudo tar xzf stellar-cli.tar.gz -C /usr/local/bin
          rm stellar-cli.tar.gz
          stellar --version

      - name: Build workspace (host platform)
        run: cargo build --workspace

      - name: Build Soroban contracts (WASM)
        run: |
          for pkg in safe-oracle liquidity-registry mock-reflector mock-lending; do
            echo "::group::stellar contract build --package $pkg"
            stellar contract build --package "$pkg"
            echo "::endgroup::"
          done

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check
